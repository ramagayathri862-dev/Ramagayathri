<!DOCTYPE html>
<html>
    <head>
        <style>
            header{
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: transparent;
                width: 100%;
            }
            body{
                background-color: grey;
                text-align: center;
                background-image: url("images.jpg");
                background-repeat: no-repeat;
                background-size: cover;
                padding: 10px;

           .container{
            margin: 10px;
            color: white;
            text-align: center;
            padding: 10px;
           }
           .container h1{
            font-size: 40px;
            color: #222121;
           }
           .container p{
            font-size: 20px;
            color: #222121;
           }
           nav{
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background-color: transparent;
           }
           nav ul{
            display: flex;
            margin: 0px;
            padding:0px;
            list-style: none;
            justify-content: center;
           }
           nav li{
            margin: 0%;
            padding: 10px 20px;
            justify-content: center;
            font-weight: bold;
           }
           nav a{
            color: whitesmoke;
            justify-content: center;
            text-decoration: none;
           }
           nav a:hover{
            color: #444;
            text-decoration: none;
            background-color: grey;
            padding: 10px;
           }
           .form {
            display: block;
            margin:auto;
            color: black;
            background-color: #f4f4f4;
            border:black 2px solid;
            font-size: 20px;    
           }
           footer {
            background-color: #222121;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
            padding-left: 0px;
            margin-bottom: 10px;
            }
            footer p{
                margin: 0px;
                text-align: center;
                padding: 10px;
                padding-left: 0px;
                color: white;
                background-color: #222121;
                font-size: 20px;
            }
